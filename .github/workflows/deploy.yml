name: Deploy

on:
  push:
    branches: [main]

# Prevent two deploys running simultaneously on the self-hosted runner.
concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      - run: npm run typecheck
      - run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    environment: production # requires manual approval from maintainers before touching the homeserver
    # ── Customise the three variables below for your setup ──────────────
    # SERVICE_USER  — OS user the service runs as (must own REPO_PATH)
    # REPO_PATH     — absolute path where the repo is checked out on the server
    # SERVICE_NAME  — systemd service name (matches your .service file)
    env:
      SERVICE_USER: zanuda
      REPO_PATH: /mnt/data/projects/review-helper
      SERVICE_NAME: review-helper
    steps:
      - name: Sync to origin/main
        # fetch + checkout main + reset --hard guarantees the working tree is
        # exactly origin/main regardless of:
        #   - uncommitted local changes (reset --hard discards them)
        #   - being on a different branch (checkout main switches back)
        #   - detached HEAD state
        # Never use pull --ff-only here: a dirty working tree will abort it,
        # and that's exactly what happened on a previous deploy.
        run: |
          sudo -u $SERVICE_USER git -C $REPO_PATH fetch origin main
          sudo -u $SERVICE_USER git -C $REPO_PATH checkout main
          sudo -u $SERVICE_USER git -C $REPO_PATH reset --hard origin/main

      - name: Install dependencies
        # --ignore-scripts: never run dependency lifecycle scripts on the host.
        run: sudo -u $SERVICE_USER bash -c "npm ci --ignore-scripts --prefix $REPO_PATH"

      - name: Build
        run: sudo -u $SERVICE_USER bash -c "npm run build --prefix $REPO_PATH"

      - name: Restart service
        run: sudo systemctl restart $SERVICE_NAME
