name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C /mnt/data/projects/review-helper pull origin main

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: /mnt/data/projects/review-helper

      - name: Build
        run: npm run build
        working-directory: /mnt/data/projects/review-helper

      - name: Restart service
        run: sudo systemctl restart review-helper
