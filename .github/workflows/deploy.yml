name: Deploy

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

  deploy:
    needs: test
    runs-on: self-hosted
    steps:
      # Pull and build as `zanuda` — the user the service runs as.
      # HTTPS remote; credentials in zanuda's ~/.git-credentials.
      - name: Pull latest code
        run: sudo -u zanuda bash -c 'git -C /mnt/data/projects/review-helper pull --ff-only origin main'

      # --ignore-scripts: never run dependency lifecycle scripts on the host.
      # npm ci installs exactly the locked tree (package-lock.json).
      - name: Install dependencies
        run: sudo -u zanuda bash -c 'npm ci --ignore-scripts --prefix /mnt/data/projects/review-helper'

      - name: Build
        run: sudo -u zanuda bash -c 'npm run build --prefix /mnt/data/projects/review-helper'

      - name: Restart service
        run: sudo systemctl restart review-helper
